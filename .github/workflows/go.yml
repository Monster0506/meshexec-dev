name: Go CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # Job for formatting and linting checks.
  # This job also attempts to auto-fix formatting and creates a PR if changes are detected.
  format-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.x' # Use a recent stable Go version for formatting/linting

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache golangci-lint binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-lint-${{ hashFiles('.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-golangci-lint-

      - name: Install tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Check and Fix Formatting & Imports
        run: |
          # Apply gofmt and goimports fixes
          gofmt -w .
          goimports -w .

      - name: Create Pull Request for Formatting Changes
        # This step only runs on pull_request events
        # It creates a new PR with formatting fixes if the previous step made changes.
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-format Go code"
          # Create a unique branch name based on the head ref
          branch: auto-fix/go-format-${{ github.head_ref }}
          title: "chore: Auto-format Go code"
          body: |
            This PR automatically applies `gofmt` and `goimports` fixes.
            Please review and merge.
          labels: automated-fix
          # Assign the PR to the person who opened the original pull request
          reviewers: ${{ github.actor }}
          # Ensure go.mod and go.sum are also included if they changed (e.g., due to imports)
          add-paths: |
            **/*.go
            go.mod
            go.sum

      - name: Run Linters
        run: golangci-lint run --timeout=5m

  # Job for building, testing with race detector, and coverage reporting.
  # This job uses a matrix strategy for cross-OS and cross-Go version testing.
  build-test-coverage:
      runs-on: ${{ matrix.os }}
      needs: format-lint
      strategy:
        matrix:
          include:
            - os: ubuntu-latest
              go-version: '1.24.x'
            - os: ubuntu-latest
              go-version: '1.23.x'
            - os: ubuntu-latest
              go-version: '1.22.x'
            - os: macos-latest
              go-version: '1.24.x'
            - os: windows-latest
              go-version: '1.24.x'
        fail-fast: false

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Go ${{ matrix.go-version }}
          uses: actions/setup-go@v4
          with:
            go-version: ${{ matrix.go-version }}

        - name: Cache Go modules
          uses: actions/cache@v4
          with:
            path: |
              ~/go/pkg/mod
              ~/.cache/go-build
            key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
            restore-keys: |
              ${{ runner.os }}-go-

        - name: Build project
          run: go build -v ./...

        - name: Run tests with coverage and race detector
          run: go test -v -race ./... -coverprofile=coverage.out

        - name: Display coverage in PR summary
          if: github.event_name == 'pull_request'
          run: |
            go tool cover -func=coverage.out -o coverage.txt
            echo "## Go Test Coverage" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat coverage.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY

        - name: Upload coverage to Codecov
          uses: codecov/codecov-action@v4
          with:
            files: coverage.out
            fail_ci_if_error: true
            token: ${{ secrets.CODECOV_TOKEN }}

  # Job for security and dependency checks.
  security-checks:
    runs-on: ubuntu-latest
    needs: build-test-coverage # Run after main build/test to ensure basic functionality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.x' # Use a recent stable Go version

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run go mod tidy and check for changes
        run: |
          go mod tidy
          # Check if go.mod or go.sum were modified by go mod tidy.
          # If they were, it means they were not in sync with the source code.
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "::error::go.mod or go.sum were modified by 'go mod tidy'."
            echo "Please run 'go mod tidy' locally and commit the changes."
            git diff
            exit 1
          fi

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck for vulnerabilities
        # Scans your module for known vulnerabilities in dependencies
        run: govulncheck ./...
