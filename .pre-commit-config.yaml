# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: gofmt
        entry: gofmt -w .
        language: system
        types: [go]

      - id: go-imports
        name: goimports
        entry: goimports -w .
        language: system
        types: [go]