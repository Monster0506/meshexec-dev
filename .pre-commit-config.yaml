# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: gofmt
        entry: gofmt -w .
        language: system
        files: '\.go$'

      - id: go-imports
        name: goimports
        entry: goimports -w .
        language: system
        files: '\.go$'

      - id: go-lint
        name: golangci-lint
        entry: golangci-lint run --timeout=5m
        language: system
        pass_filenames: false
        files: '\.go$'

      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        pass_filenames: false
        always_run: true

      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        always_run: true
        pass_filenames: false
        verbose: true